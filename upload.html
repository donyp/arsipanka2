<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Invoice Merah � Pusat Arsip Anka</title>
    <meta name="description" content="Upload dokumen arsip ke Google Drive">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // Strengthened Anti-Flash (FOUC) System v2.0
        (function () {
            document.documentElement.classList.add('auth-loading');
            try {
                const userData = localStorage.getItem('user_data');
                if (userData) {
                    const user = JSON.parse(userData);
                    if (user.role === 'admin_zona') {
                        document.documentElement.classList.add('role-admin-zona');
                    }
                }
            } catch (e) { }
        })();
    </script>
</head>

<body class="bg-[#F0F2F5] min-h-screen text-gray-800">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <!-- Sidebar (rendered by js/sidebar.js?v=ULTRACLEAN_2026) -->
    <aside id="sidebar"
        class="sidebar fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 flex flex-col z-40">
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="ml-64 min-h-screen transition-all duration-300">
        <!-- Top Bar -->
        <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-200 px-6 py-4">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg text-gray-400 hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <div>
                    <h2 class="text-xl font-bold text-gray-900">Upload Doc</h2>
                    <p class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Antrian Upload Dokumen
                        Arsip</p>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div class="max-w-4xl mx-auto space-y-6">
                <!-- Upload Form Card -->
                <div
                    class="bg-white rounded-[2rem] p-10 shadow-xl shadow-blue-500/5 border border-gray-100 overflow-hidden relative">

                    <!-- Decorative Background Glow -->
                    <div
                        class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500/10 blur-[80px] rounded-full pointer-events-none">
                    </div>
                    <div
                        class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-500/5 blur-[80px] rounded-full pointer-events-none">
                    </div>

                    <form id="upload-form" class="space-y-6 relative z-10">
                        <!-- Drag & Drop Zone -->
                        <div>
                            <div class="flex items-center justify-between mb-3 px-1">
                                <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Berkas
                                    Dokumen</label>
                                <span class="text-[10px] text-gray-600 font-medium tracking-tight">Maks 25MB •
                                    PDF/JPG/PNG</span>
                            </div>
                            <div id="drop-zone"
                                class="drop-zone rounded-3xl p-16 text-center cursor-pointer border-2 border-dashed border-gray-200 bg-gray-50 hover:bg-blue-50 hover:border-blue-300 transition-all duration-300"
                                onclick="document.getElementById('file-input').click()">
                                <div id="drop-zone-content">
                                    <div
                                        class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-200">
                                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                        </svg>
                                    </div>
                                    <p class="text-base text-gray-900 mb-1 font-bold">Klik atau seret file ke sini</p>
                                    <p class="text-xs text-gray-400 font-medium">Dokumen akan diproses dalam antrian
                                        otomatis</p>
                                </div>
                                <div id="file-info" class="hidden text-left w-full">
                                    <div class="flex justify-between items-center mb-4 pb-2 border-b border-white/5">
                                        <div class="flex items-center gap-2">
                                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                            <p class="text-xs font-bold text-gray-300 uppercase tracking-wider">Berkas
                                                Terpilih</p>
                                        </div>
                                        <button type="button" onclick="clearFile(event)"
                                            class="text-[10px] font-bold text-red-400 hover:text-red-300 bg-red-500/10 px-2 py-1 rounded-md transition-colors uppercase tracking-tighter">Bersihkan
                                            Antrean</button>
                                    </div>
                                    <ul id="file-list-display"
                                        class="grid grid-cols-1 gap-3 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                                        <!-- Files injected here by JS -->
                                    </ul>
                                </div>
                            </div>
                            <input id="file-input" type="file" class="hidden" accept=".pdf,.jpg,.jpeg,.png" multiple
                                onchange="handleFileSelect(this)">
                        </div>

                        <!-- Secondary Info Row -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <!-- Nominal Rupiah -->
                            <div>
                                <label
                                    class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Total
                                    Nilai Invoice</label>
                                <div class="relative group">
                                    <span
                                        class="absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400 font-bold text-sm tracking-tight pt-0.5">Rp</span>
                                    <input type="number" id="upload-nominal" placeholder="0"
                                        class="input-field w-full pl-11 pr-4 py-3.5 rounded-xl text-sm font-semibold tracking-tight transition-all focus:scale-[1.01]">
                                </div>
                            </div>
                            <!-- Category (Fixed as Invoice) -->
                            <div>
                                <label
                                    class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Kategori
                                    Dokumen</label>
                                <div class="relative opacity-60">
                                    <input type="text" value="Invoice Merah" disabled
                                        class="input-field w-full px-4 py-3.5 rounded-xl text-sm font-semibold bg-white/5 cursor-not-allowed">
                                    <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"
                                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <!-- Description -->
                        <div>
                            <label
                                class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Catatan
                                Tambahan</label>
                            <textarea id="upload-description" rows="3"
                                placeholder="Misal: Nomor PO, nama cabang, atau detail lainnya..."
                                class="input-field w-full px-4 py-3.5 rounded-xl text-sm resize-none transition-all focus:scale-[1.01]"></textarea>
                        </div>

                        <!-- Progress Bar -->
                        <div id="upload-progress-container"
                            class="hidden space-y-3 bg-indigo-500/5 p-4 rounded-2xl border border-indigo-500/10">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <div class="loader-mini w-4 h-4 text-indigo-400"></div>
                                    <span class="text-xs font-bold text-indigo-300 uppercase tracking-wider">Proses
                                        Unggah...</span>
                                </div>
                                <span id="upload-progress-pct"
                                    class="text-sm font-bold text-white tracking-widest">0%</span>
                            </div>
                            <div class="progress-bar bg-white/5 h-2">
                                <div id="upload-progress-bar" class="progress-bar-fill h-2" style="width: 0%"></div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button id="upload-btn" type="submit"
                            class="btn-primary w-full py-4 rounded-xl text-sm font-bold flex items-center justify-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed shadow-xl shadow-indigo-600/20 active:scale-[0.98] transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                            Mulai Upload Antrean
                        </button>
                    </form>
                </div>

                <!-- Recent Uploads -->
                <div class="glass-card rounded-3xl p-6 animate-fade-in-up border border-white/5">
                    <div class="flex items-center justify-between mb-5 px-1">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center">
                                <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <h3 class="text-sm font-bold text-white uppercase tracking-wider">Unggahan Terakhir</h3>
                        </div>
                        <span
                            class="text-[10px] font-bold text-gray-600 uppercase tracking-[0.2em] animate-pulse">Live</span>
                    </div>
                    <div id="recent-uploads" class="space-y-3">
                        <div class="flex flex-col items-center justify-center py-10 opacity-30">
                            <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <p class="text-sm font-medium">Memuat unggahan terbaru...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/sidebar.js?v=ULTRACLEAN_2026"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js?v=1778387279965"></script>
    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
    </script>
</body>

</html>
