<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Team Ads</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-fade-in-up">
        <div class="bg-white rounded-[2rem] shadow-xl border border-gray-100 p-10">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold text-blue-600 tracking-tight">Team Ads</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Performance Management System</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2 ml-1">Username / Email</label>
                    <input type="text" id="username" placeholder="Masukkan username" required
                        class="w-full px-5 py-4 bg-white border border-blue-100 rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-400 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2 ml-1">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required
                        class="w-full px-5 py-4 bg-gray-50 border border-transparent rounded-2xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-50 focus:bg-white focus:border-blue-400 transition-all">
                </div>
                <div class="pt-2">
                    <button type="submit" id="login-btn"
                        class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5">
                        Masuk Sekarang
                    </button>
                </div>
                <div class="text-center">
                    <a href="#" class="text-xs font-semibold text-gray-400 hover:text-blue-600">Lupa Password?</a>
                </div>
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-gray-100"></div>
                    <span class="flex-shrink mx-4 text-[9px] font-bold text-gray-300 uppercase tracking-widest">Atau Masuk Dengan</span>
                    <div class="flex-grow border-t border-gray-100"></div>
                </div>
                <button type="button" class="w-full py-4 bg-white border border-gray-100 rounded-2xl flex items-center justify-center gap-3 hover:bg-gray-50 transition-all">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" class="w-5 h-5">
                    <span class="text-sm font-bold text-gray-700">Akun Google Kantor</span>
                </button>
            </form>
            <div class="mt-12 text-center">
                <p class="text-[9px] font-bold text-gray-300 uppercase tracking-widest">© 2026 Mega Group Indonesia. Internal Use Only.</p>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = `<div class="flex items-center justify-center gap-2"><span>Memproses...</span></div>`;
            try {
                const success = await login(document.getElementById('username').value, document.getElementById('password').value);
                if (!success) { btn.disabled = false; btn.innerText = 'Masuk Sekarang'; }
            } catch (err) { btn.disabled = false; btn.innerText = 'Masuk Sekarang'; }
        });
    </script>
</body>
</html>
